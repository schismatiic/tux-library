<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tux Library</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="https://upload.wikimedia.org/wikipedia/commons/a/af/Tux.png">

</head>

<body>
    <div class="main-container">
        <div class="container__logo">
            <img id="tux" src="https://upload.wikimedia.org/wikipedia/commons/a/af/Tux.png" alt="tux-image"
                width="30px">
            <h1>Tux<span>Library</span></h1>
        </div>
        <div id="book-container">
            <button command="show-modal" commandfor="my-dialog" id="new-book">+ New book</button>
            <div>
                <dialog id="my-dialog">
                    <form method="dialog">
                        <h4>Add a new book</h4>
                        <section id="inputs">
                            <label for="name">Name</label>
                            <input id="name" type="text" placeholder="Don Quijote de la Mancha">
                            <label for="author">Author</label>
                            <input id="author" type="text" placeholder="Miguel de Cervantes">
                            <label for="numberOfPages">Number of pages</label>
                            <input id="numberOfPages" type="number" placeholder="1380">
                        </section>
                        <menu>
                            <button id="submit__button" type="submit">Confirm</button>
                        </menu>
                    </form>
                    <div class="close__box">
                        <button id="close" commandfor="my-dialog" command="close">[X] Close</button>
                    </div>
                </dialog>
            </div>

        </div>

    </div>
    <script src="script.js"></script>
</body>

</html>
